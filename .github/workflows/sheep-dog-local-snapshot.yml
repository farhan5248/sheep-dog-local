name: Publish Sheep Dog Local Snapshot

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - '.github/**'
      - '**/docker/**'
      - '**/src/**'
      - '**/pom.xml'
permissions:
  contents: write
  packages: write

jobs:
  sheep-dog-grammar:
    uses: farhan5248/sheep-dog-ops/.github/workflows/snapshot-maven.yml@main
    with:
      project: 'sheep-dog-grammar'
    secrets: inherit

  sheep-dog-asciidoc:
    needs: [sheep-dog-grammar]
    uses: farhan5248/sheep-dog-ops/.github/workflows/snapshot-maven.yml@main
    with:
      project: 'sheepdogasciidoc.parent'
    secrets: inherit

  sheep-dog-cucumber:
    uses: farhan5248/sheep-dog-ops/.github/workflows/snapshot-maven.yml@main
    with:
      project: 'sheepdogcucumber.parent'
    secrets: inherit

  sheep-dog-asciidoc-api:
    needs: [sheep-dog-asciidoc]
    uses: farhan5248/sheep-dog-ops/.github/workflows/snapshot-maven.yml@main
    with:
      project: 'sheep-dog-asciidoc-api'
    secrets: inherit

  sheep-dog-cucumber-gen:
    needs: [sheep-dog-asciidoc-api, sheep-dog-cucumber]
    uses: farhan5248/sheep-dog-ops/.github/workflows/snapshot-maven.yml@main
    with:
      project: 'sheep-dog-cucumber-gen'
    secrets: inherit

  merge-into-develop:
    needs: [sheep-dog-asciidoc-api, sheep-dog-cucumber-gen]
    uses: farhan5248/sheep-dog-ops/.github/workflows/merge.yml@main
    with:
      source: 'main'
      target: 'develop'
    secrets: inherit
