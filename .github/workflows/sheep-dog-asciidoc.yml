name: Publish Sheep Dog AsciiDoc Release

on:
  workflow_dispatch:
permissions:
  contents: write
  packages: write

jobs:
  sheep-dog-asciidoc:
    uses: farhan5248/sheep-dog-ops/.github/workflows/maven-release.yml@main
    with:
      project: 'sheepdogasciidoc.parent'
      plugin: 'Sheep'
    secrets: inherit

  sheep-dog-dev:
    needs: [sheep-dog-asciidoc]
    uses: farhan5248/sheep-dog-ops/.github/workflows/maven-release.yml@main
    with:
      project: 'sheep-dog-dev'
      plugin: 'Maven'
    secrets: inherit

  merge-into-develop:
    needs: [sheep-dog-dev]
    uses: farhan5248/sheep-dog-ops/.github/workflows/merge.yml@main
    with:
      source: 'main'
      target: 'develop'
    secrets: inherit
