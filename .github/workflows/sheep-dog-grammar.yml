name: Publish Sheep Dog Grammar Release

on:
  workflow_dispatch:
permissions:
  contents: write
  packages: write

jobs:
  sheep-dog-grammar:
    uses: farhan5248/sheep-dog-ops/.github/workflows/release-maven.yml@main
    with:
      project: 'sheep-dog-grammar'
      plugin: 'Maven'
    secrets: inherit

  sheep-dog-asciidoc:
    needs: [sheep-dog-grammar]
    uses: farhan5248/sheep-dog-ops/.github/workflows/release-maven.yml@main
    with:
      project: 'sheepdogasciidoc.parent'
      plugin: 'Sheep'
    secrets: inherit

  sheep-dog-asciidoc-api:
    needs: [sheep-dog-asciidoc]
    uses: farhan5248/sheep-dog-ops/.github/workflows/release-maven.yml@main
    with:
      project: 'sheep-dog-asciidoc-api'
      plugin: 'Maven'
    secrets: inherit

  sheep-dog-cucumber-gen:
    needs: [sheep-dog-asciidoc-api]
    uses: farhan5248/sheep-dog-ops/.github/workflows/release-maven.yml@main
    with:
      project: 'sheep-dog-cucumber-gen'
      plugin: 'Maven'
    secrets: inherit

  merge-into-develop:
    needs: [sheep-dog-cucumber-gen]
    uses: farhan5248/sheep-dog-ops/.github/workflows/merge.yml@main
    with:
      source: 'main'
      target: 'develop'
    secrets: inherit
