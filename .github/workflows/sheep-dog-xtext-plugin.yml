name: Publish Sheep Dog Xtext Plugin Release

on:
  workflow_dispatch:
permissions:
  contents: write
  packages: write

jobs:
  sheep-dog-xtext-plugin:
    uses: farhan5248/sheep-dog-ops/.github/workflows/maven-release.yml@main
    with:
      project: 'sheepdogxtextplugin.parent'
      plugin: 'Sheep'
    secrets: inherit

  merge-into-develop:
    needs: [sheep-dog-xtext-plugin]
    uses: farhan5248/sheep-dog-ops/.github/workflows/merge.yml@main
    with:
      source: 'main'
      target: 'develop'
    secrets: inherit
